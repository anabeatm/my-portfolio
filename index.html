<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ana's Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <section class="me-window">
        <header class="header-me">
          <span>&lt;main&gt;</span>
        </header>

        <div class="me">
          <h1>Hey, I'm Ana Beatriz!</h1>
          <p>&lt;student, front-end developer, nerd&gt;</p>
        </div>

        <nav class="pages" aria-label="Windows about me">
          <ul>
            <li>
              <img src="" alt="" />
              <button>&lt;about&gt;</button>
            </li>

            <li>
              <img src="" alt="" />
              <button>&lt;projects&gt;</button>
            </li>

            <li>
              <img src="" alt="" />
              <button>&lt;contact&gt;</button>
            </li>

            <li>
              <img src="" alt="" />
              <button>&lt;experiences&gt;</button>
            </li>
          </ul>
        </nav>

        <nav class="socials" aria-label="Social Media">
          <ul>
            <li class="social">
              <a
                href="https://github.com/anabeatm"
                target="_blank"
                rel="noopener noreferrer"
                >Github</a
              >
            </li>

            <li class="social">
              <a
                href="https://www.linkedin.com/in/anabeatavares/"
                target="_blank"
                rel="noopener noreferrer"
                >Linkedin</a
              >
            </li>

            <li class="social">
              <a
                href="https://www.instagram.com/mytsu.mp3"
                target="_blank"
                rel="noopener noreferrer"
                >Instagram</a
              >
            </li>
          </ul>
        </nav>
      </section>
    </main>

    <footer>
      <div class="copyright"></div>

      <section class="taskbar">
        <div class="btn-home">
          <button class="home" aria-label="Start Menu">
            <img src="assets/svg/home-icon.svg" alt="A home icon" />
          </button>
        </div>
        <div class="weather"></div>
        <div class="sub-task">
          <div class="btn-arrow">
            <button aria-label="More configurations"></button>
          </div>
          <div class="others"></div>
        </div>
        <time class="date-time" datetime=""></time>
      </section>
    </footer>

    <script type="module" src="js/script.js"></script>
  </body>
</html>
