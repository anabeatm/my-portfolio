<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ana's Portfolio</title>
    <link
      rel="shortcut icon"
      type="image/png"
      href="assets\img\icon-site.png"
    />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section class="me-window">
        <header class="header-me">
          <span>&lt;main&gt;</span>
          <button>
            <img src="assets/svg/xmark-solid-full.svg" alt="A X close" />
          </button>
        </header>
        <div class="about-me">
          <div class="title-subtitle">
            <h1 data-i18n="greeting">Hey, I'm Ana Beatriz!</h1>
            <p data-i18n="role">&lt;student &amp; front-end developer&gt;</p>
          </div>

          <nav class="pages" aria-label="Windows about me">
            <ul>
              <li>
                <button onclick="openPage('about')">
                  <img
                    src="assets/svg/personal-icon.svg"
                    alt="A person icon"
                    aria-hidden="true"
                  />
                  <span data-i18n="about">&lt;about&gt;</span>
                </button>
              </li>

              <li>
                <button onclick="openPage('projects')">
                  <img
                    src="assets/svg/pin-icon.svg"
                    alt="A pin icon"
                    aria-hidden="true"
                  /><span data-i18n="projects">&lt;projects&gt;</span>
                </button>
              </li>

              <li>
                <button onclick="openPage('contact')">
                  <img
                    src="assets/svg/mail-icon.svg"
                    alt="A mail icon"
                    aria-hidden="true"
                  /><span data-i18n="contact">&lt;contact&gt;</span>
                </button>
              </li>

              <li>
                <button onclick="openPage('path')">
                  <img
                    src="assets/svg/enterprise-icon.svg"
                    alt="A internet icon"
                    aria-hidden="true"
                  /><span data-i18n="path">&lt;path&gt;</span>
                </button>
              </li>
            </ul>
          </nav>
        </div>
      </section>

      <nav class="socials" aria-label="Social Media">
        <ul>
          <li class="social">
            <a
              href="https://github.com/anabeatm"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="My Github page"
            >
              <img
                src="assets/svg/github-brands-solid-full.svg"
                alt="A Github icon"
                aria-hidden="true"
              />
            </a>
          </li>

          <li class="social">
            <a
              href="https://www.linkedin.com/in/anabeatavares/"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img
                src="assets/svg/linkedin-brands-solid-full.svg"
                alt="A Linkedin icon"
                aria-hidden="true"
              />
            </a>
          </li>

          <li class="social">
            <a
              href="https://www.instagram.com/mytsu.mp3"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img
                src="assets/svg/instagram-brands-solid-full.svg"
                alt="A instagram icon"
                aria-hidden="true"
              />
            </a>
          </li>
        </ul>
      </nav>
    </main>

    <footer>
      <section class="copyright">
        <div class="copyright-text">
          <span data-i18n="copyright">created with coffee and inspired by</span>
          <a href="https://www.sharyap.com/" target="_blank">Sharlene</a>
        </div>
      </section>

      <section class="taskbar">
        <div class="taskbar-left">
          <div class="btn-home">
            <a
              class="home"
              aria-label="Start Menu"
              href="index.html"
              rel="noopener noreferrer"
            >
              <img src="assets/svg/home-icon.svg" alt="" aria-hidden="true" />
            </a>
          </div>
          <div class="weather">
            <span>Weather C° - Location</span>
            <img src="assets/svg/cloud-icon.svg" alt="A cloud icon" />
          </div>
        </div>

        <div class="taskbar-right">
          <div class="sub-task">
            <div id="toggle-settings-btn" class="btn-arrow">
              <button aria-label="More configurations">
                <img
                  src="assets/svg/circle-up-regular-full.svg"
                  alt="A circle with a arrow up icon"
                />
              </button>
            </div>
            <div id="settings-modal" class="others">
              <button id="toggle-music-btn" aria-label="Open music player">
                <img src="assets/svg/music-solid-full.svg" alt="" />
              </button>
              <button id="toggle-theme-btn" aria-label="Toggle dark mode">
                <img src="assets/svg/sun-solid-full.svg" alt="" />
              </button>
              <button id="toggle-lang-btn" aria-label="Change language">
                🇧🇷
              </button>
            </div>
          </div>

          <div id="mini-player-container" class="hidden">
            <iframe
              style="border-radius: 12px"
              src="https://open.spotify.com/embed/playlist/0vvXsWCC9xrXsKd4FyS8kM?utm_source=generator&theme=0"
              width="100%"
              height="152"
              frameborder="0"
              allow="
                autoplay;
                clipboard-write;
                encrypted-media;
                fullscreen;
                picture-in-picture;
              "
              loading="lazy"
            ></iframe>
          </div>

          <time class="date-time" datetime="">
            <div class="time">00:00</div>
            <div class="date">01/01/2026</div>
          </time>
        </div>
      </section>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
